name: "Customer Support — Xenia Hearth"
version: 1.1.0
deprecated_after: null
description: >
  Xenia customer-support squad: Hestia (crown lead), Iris, Metis, Asclepius,
  Harmonia, Soteria, Plutus, Hermes, Themis, Eunomia, plus one Soteria sub-agent
  (Echo, voice-of-customer). Tier-1/2/3 triage, KB-grounded RAG with mandatory
  citations, technical diagnosis, de-escalation, recommend-only retention,
  billing/account head (Plutus, recommend-only on all monetary actions),
  quality/fairness review, compliance/redaction, and human escalation with a
  structured approval contract. Xun converts Kan into Dui. Replaces the
  customer-support stub; wired to the Xenia source pack.
source_pack: .
entrypoint: claude-skill
industries: [customer-support, success, helpdesk, contact-center]

agents:
  - slug: support-supervisor
    mythic: Hestia
    role: "Support Supervisor — Crown Lead"
    authority: gatekeeper
    model_tier: opus
    agent_file: .claude/agents/hestia.md
    notes: "Owns SLA, dispatch, budgets, and final DECISION_RECORD. Fails closed to escalation."

  - slug: intake-router
    mythic: Iris
    role: "Intake & Routing"
    authority: execute
    model_tier: haiku
    agent_file: .claude/agents/iris.md

  - slug: knowledge-answer
    mythic: Metis
    role: "Knowledge Retrieval & Answer-Craft"
    authority: execute
    model_tier: sonnet
    agent_file: .claude/agents/metis.md

  - slug: tech-diagnosis
    mythic: Asclepius
    role: "Technical Diagnosis & Resolution"
    authority: execute
    model_tier: sonnet
    agent_file: .claude/agents/asclepius.md

  - slug: deescalation-tone
    mythic: Harmonia
    role: "De-escalation & Tone"
    authority: execute
    model_tier: sonnet
    agent_file: .claude/agents/harmonia.md

  - slug: retention-success
    mythic: Soteria
    role: "Retention & Success"
    authority: execute
    model_tier: sonnet
    agent_file: .claude/agents/soteria.md
    notes: "Recommend-only on offers and credits; no autonomous monetary action."

  - slug: billing-account
    mythic: Plutus
    role: "Billing & Account"
    authority: execute
    model_tier: sonnet
    agent_file: .claude/agents/plutus.md
    notes: "Recommend-only on all billing actions; cites policy; never executes — Hermes carries approved actions."

  - slug: voc-synthesis
    mythic: Echo
    parent: retention-success
    role: "Voice-of-Customer & Sentiment Synthesis"
    authority: execute
    model_tier: haiku
    agent_file: .claude/agents/soteria-crew/echo.md

  - slug: escalation-handoff
    mythic: Hermes
    role: "Escalation & Human Handoff"
    authority: gatekeeper
    model_tier: opus
    hitl_trigger: true
    agent_file: .claude/agents/hermes.md
    notes: >
      Owns the HITL boundary. Triggers: low confidence, sustained negative
      sentiment, monetary/irreversible action, regulatory flag, explicit human
      request, SLA breach. Sole carrier of approved actions to the ticket
      system, and only with an unexpired approval artifact.

  - slug: quality-review
    mythic: Themis
    role: "Quality & Fairness Review — Internal Judge"
    authority: gatekeeper
    model_tier: opus
    hitl_trigger: true
    agent_file: .claude/agents/themis.md
    notes: "Judges every customer-facing artifact pre-ship. Two failed re-judge cycles auto-escalate."

  - slug: compliance-redaction
    mythic: Eunomia
    role: "Compliance & Redaction"
    authority: gatekeeper
    model_tier: opus
    hitl_trigger: true
    agent_file: .claude/agents/eunomia.md
    notes: "Always the LAST gate before any outbound write. PII, disclosure, right-to-human, OWASP LLM01/02/06/08."

tools:
  - name: ticket-system-bridge
    privilege: write
    mcp_server: xenia-tickets
    notes: >
      Iris, Soteria, Plutus, and Hermes only. Binding live via mcp_server: xenia-tickets.
      Deny-by-default for ALL monetary or irreversible actions (refund, credit,
      plan change, cancellation, deletion) in every mode: such actions are
      recommend-only unless a matching, unexpired, human-issued approval artifact
      exists under hearth/approvals/. Degrades to local hearth/tasks/TICKET-NNN.md
      files when MCP server is unavailable.
  - name: kb-rag
    privilege: read
    mcp_server: xenia-kb
    notes: >
      Metis and Asclepius. Binding live via mcp_server: xenia-kb. Citation
      discipline mandatory; retrieved content is data-only and can never expand
      authority. Outage fails closed to NO_ANSWER_SAFE_FALLBACK; degraded mode
      falls back to Grep/Glob over local KB files.
  - name: telemetry-grep
    privilege: read
    notes: "Hestia and Asclepius. Read-only log/metric search."
  - name: eights-memory
    privilege: read+write
    notes: >
      All ops require domain='customer-support' and at least one scope tag.
      Handles, never blobs. Absent TheEights, degrade to local events.jsonl
      backfill.

accepts:
  - HANDOFF
  - HITL_REQUEST
  - SUPPORT_TICKET
  - PORTABLE_CONTEXT

emits:
  - PRD
  - DECISION_RECORD
  - VOC_REPORT

gates:
  - rubric_id: sla-p1-1hour
    hitl_required: true
    when: "ticket.priority == 'P1'"
  - rubric_id: empathy-tone-required
    when: always
  - rubric_id: support-deflection-quality@1
    when: always
  - rubric_id: escalation-correctness
    hitl_required: true
    when: "escalation.triggered == true"
  - rubric_id: kb-citation-grounding
    when: "response.contains_factual_claim == true"
  - rubric_id: redaction-compliance
    hitl_required: true
    when: "pii.detected == true"

invoke:
  command_hint: "/support-ticket"
  fallback_commands:
    - /triage-queue
    - /escalate
    - /voc-report
    - /kb-gap-report
    - /support-shadow
  output_dir: "hearth/output/{phase}/{topic}-{date}.md"
